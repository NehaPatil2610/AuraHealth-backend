server:
  port: 8060

aura:
  jwt-secret: ${AURA_JWT_SECRET:AuraHealthDevelopmentOnlySecretChangeMe2026!}
  internal:
    oauth-key: ${AURA_INTERNAL_OAUTH_KEY:local-development-oauth-key}

spring:
  application:
    name: api-gateway

  # ── WebFlux Session Configuration ────────────────────────────
  # Ensures the reactive session survives the OAuth2 redirect flow
  webflux:
    session:
      timeout: 30m

  cloud:
    gateway:
      routes:
        - id: aurahealth-core-api
          uri: http://localhost:8080
          predicates:
            - Path=/api/**

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            user-name-attribute: sub

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.security: INFO
