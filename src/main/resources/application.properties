# ── Server ─────────────────────────────────────────────────────
# Backend dev origin the frontend proxies to (http://localhost:8060).
server.port=${SERVER_PORT:8060}

# ── Database ───────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.application.name=aurahealth-core-service
# ── Flyway ─────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.validate-on-migrate=false

# ── AuraHealth JWT ─────────────────────────────────────────────
aura.jwt-secret=${AURA_JWT_SECRET:AuraHealthDevelopmentOnlySecretChangeMe2026!}
aura.jwt-expiration-ms=${AURA_JWT_EXPIRATION_MS:86400000}
aura.frontend-url=${AURA_FRONTEND_URL:http://localhost:5174}
aura.internal.oauth-key=${AURA_INTERNAL_OAUTH_KEY:local-development-oauth-key}

# Cookie Secure flag: false for local http, true in prod (https) via AURA_COOKIE_SECURE=true.
aura.cookie.secure=${AURA_COOKIE_SECURE:false}

# ── Dev-Only Mock Auth Bypass (NEVER enable in production) ─────
aura.mock-auth.enabled=${AURA_MOCK_AUTH_ENABLED:true}

# ── Google OAuth2 Client ───────────────────────────────────────
# Credentials come from env vars only (never commit them). See README "Google OAuth2 setup".
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ── Eureka ─────────────────────────────────────────────────────
# Off by default so the backend runs standalone (no Eureka server needed).
# Set EUREKA_ENABLED=true when running the full microservice stack.
eureka.client.enabled=${EUREKA_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_ENABLED:false}
eureka.client.fetch-registry=${EUREKA_ENABLED:false}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/