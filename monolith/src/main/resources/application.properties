# ── Server ─────────────────────────────────────────────────────
server.port=8080

# ── Database ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/aurahealth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.application.name=aurahealth-core-service
# ── Flyway ─────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.validate-on-migrate=false

# ── AuraHealth JWT ─────────────────────────────────────────────
aura.jwt-secret=${AURA_JWT_SECRET:AuraHealthDevelopmentOnlySecretChangeMe2026!}
aura.jwt-expiration-ms=${AURA_JWT_EXPIRATION_MS:86400000}
aura.frontend-url=${AURA_FRONTEND_URL:http://localhost:5174}
aura.internal.oauth-key=${AURA_INTERNAL_OAUTH_KEY:local-development-oauth-key}

# ── Dev-Only Mock Auth Bypass (NEVER enable in production) ─────
aura.mock-auth.enabled=${AURA_MOCK_AUTH_ENABLED:true}

# ── Google OAuth2 Client ───────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=301114069087-oj290cdt2dh3jhfsqrt2n8cbab22omj9.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=****1y1p
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ── Eureka ─────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/